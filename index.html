<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Controle de Gastos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Controle de Gastos</h1>

  <form id="form-gasto">
    <input type="date" id="data" required>
    <input type="text" id="descricao" placeholder="Descrição" required>

      <select id="categoria" required>
        <option value="">Categoria</option>
        <option>Aluguel</option>
        <option>Moto</option>
        <option>Gasolina</option>
        <option>Mercado</option>
        <option>Lazer</option>
        <option>Erva</option>
        <option>Elise</option>
        <option>Cerveja</option>
        <option>Salário</option>
        <option>Outros</option>
      </select>

    <select id="tipo" required>
      <option value="despesa">Despesa</option>
      <option value="receita">Receita</option>
    </select>

    <input type="number" id="valor" placeholder="Valor" step="0.01" required>

    <button type="submit" id="botao-submit">Adicionar</button>
<button type="button" id="cancelar-edicao" style="display: none;">Cancelar</button>

  </form>
  

<div class="resumo">

  <div class="card receita">
    <h3>Receitas</h3>
    <p id="receitas">R$ 0,00</p>
  </div>

  <div class="card despesa">
    <h3>Despesas</h3>
    <p id="despesas">R$ 0,00</p>
  </div>

  <div class="card saldo">
    <h3>Saldo</h3>
    <p id="saldo">R$ 0,00</p>
  </div>

</div>

<div class="categorias-resumo">
  <h2>Gastos por categoria</h2>
  <div id="lista-categorias"></div>
</div>

<div class="tabela-container">
  <table>  
    <thead>

      <tr>
        <th>Data</th>
        <th>Descrição</th>
        <th>Categoria</th>
        <th>Tipo</th>
        <th>Valor</th>
        <th>Ações</th>
      </tr>

    </thead>
    <tbody id="lista-gastos"></tbody>
  </table>
</div>

  <script src="script.js"></script>
</body>
</html>
